# Пример конфигурации nginx для OAuth callback и SSL.
# Использование:
#   1. Замените bot.yourdomain.com на ваш домен во всех местах.
#   2. Выпустите сертификат: sudo certbot certonly --standalone -d bot.yourdomain.com
#   3. Скопируйте файл на сервер: sudo cp config/nginx-telegram-calendar-bot.conf /etc/nginx/sites-available/telegram-calendar-bot
#   4. Включите: sudo ln -sf /etc/nginx/sites-available/telegram-calendar-bot /etc/nginx/sites-enabled/
#   5. Проверьте: sudo nginx -t && sudo systemctl reload nginx
# В .env задайте: OAUTH_REDIRECT_URI=https://bot.yourdomain.com/oauth/callback

server {
    listen 80;
    server_name bot.yourdomain.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name bot.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/bot.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bot.yourdomain.com/privkey.pem;

    location /oauth/callback {
        proxy_pass http://127.0.0.1:18790;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
