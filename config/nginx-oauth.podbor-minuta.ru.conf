# OAuth callback + SSL для oauth.podbor-minuta.ru
# Проксирует /oauth/callback на хост (бот на порту 18790).
# Перед первым запуском nginx получите сертификат: docker compose run --rm certbot

server {
    listen 80;
    server_name oauth.podbor-minuta.ru;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    server_name oauth.podbor-minuta.ru;

    ssl_certificate     /etc/letsencrypt/live/oauth.podbor-minuta.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oauth.podbor-minuta.ru/privkey.pem;

    location /oauth/callback {
        proxy_pass http://host.docker.internal:18790;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 20s;
        proxy_read_timeout 30s;
    }

    location / {
        return 404;
    }
}
