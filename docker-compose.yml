services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bot}
      POSTGRES_DB: ${POSTGRES_DB:-bot}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Nginx: HTTPS и проксирование /oauth/callback на бота (порт 18790 на хосте).
  # Перед первым запуском получите сертификат: docker compose run --rm certbot
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx-oauth.podbor-minuta.ru.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_etc:/etc/letsencrypt:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    profiles:
      - oauth

  # Однократный запуск для получения сертификата Let's Encrypt (nginx не должен быть запущен).
  # Пример: docker compose run --rm certbot
  certbot:
    image: certbot/certbot
    command: certonly --standalone -d oauth.podbor-minuta.ru --non-interactive --agree-tos --email ${CERTBOT_EMAIL}
    ports:
      - "80:80"
    volumes:
      - certbot_etc:/etc/letsencrypt
    profiles:
      - oauth

  # OpenClaw Gateway: chat completions for /openclaw in the bot. Token from env OPENCLAW_GATEWAY_TOKEN.
  # Model: anthropic/claude-sonnet-4-5 (Claude subscription OAuth). Credentials persist in openclaw_credentials volume.
  openclaw-gateway:
    build:
      context: .
      dockerfile: docker/Dockerfile.openclaw-gateway
    ports:
      - "18789:18789"
    volumes:
      - ./config/openclaw-gateway.json:/home/node/.openclaw/openclaw.json:ro
      - openclaw_credentials:/home/node/.openclaw/credentials
    env_file:
      - .env
    environment:
      - OPENCLAW_GATEWAY_TOKEN
    restart: unless-stopped
    profiles:
      - openclaw

volumes:
  pgdata:
  certbot_etc:
  openclaw_credentials:
