services:
  bot:
    build: .
    restart: unless-stopped
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - OAUTH_REDIRECT_URI=${OAUTH_REDIRECT_URI}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - PORT=${PORT:-18790}
      - HOST=${HOST:-0.0.0.0}
    volumes:
      - tokens:/app/data/tokens
      - voice:/app/data/voice
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calendar-bot.rule=Host(`oauth.podbor-minuta.ru`)"
      - "traefik.http.routers.calendar-bot.entrypoints=websecure"
      - "traefik.http.routers.calendar-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.calendar-bot.loadbalancer.server.port=18790"

volumes:
  tokens:
  voice:

networks:
  dokploy-network:
    external: true
