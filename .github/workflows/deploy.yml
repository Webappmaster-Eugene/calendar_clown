name: Build and Deploy to VDS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/telegram-calendar-bot

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create .env for server
        run: |
          printf 'TELEGRAM_BOT_TOKEN=%s\nGOOGLE_CLIENT_ID=%s\nGOOGLE_CLIENT_SECRET=%s\nOPENROUTER_API_KEY=%s\n' \
            "$TELEGRAM_BOT_TOKEN" "$GOOGLE_CLIENT_ID" "$GOOGLE_CLIENT_SECRET" "$OPENROUTER_API_KEY" \
            > .env.deploy
          if [ -n "$OAUTH_REDIRECT_URI" ]; then
            printf 'OAUTH_REDIRECT_URI=%s\n' "$OAUTH_REDIRECT_URI" >> .env.deploy
          fi
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OAUTH_REDIRECT_URI: ${{ secrets.OAUTH_REDIRECT_URI }}

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VDS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy files
        run: |
          rsync -avz -e "ssh -o StrictHostKeyChecking=no" \
            dist \
            package.json \
            package-lock.json \
            .env.example \
            scripts \
            src \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/

      - name: Upload .env and restart
        run: |
          scp -o StrictHostKeyChecking=no .env.deploy ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/.env.deploy
          ssh -o StrictHostKeyChecking=no ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ${{ env.DEPLOY_PATH }} && ( [ -f .env ] && grep -v -E '^(TELEGRAM_BOT_TOKEN|GOOGLE_CLIENT_ID|GOOGLE_CLIENT_SECRET|OPENROUTER_API_KEY|OAUTH_REDIRECT_URI)=' .env ; cat .env.deploy ) > .env.merged && mv .env.merged .env && rm -f .env.deploy && npm install --omit=dev && mkdir -p data/tokens data/voice && systemctl restart telegram-calendar-bot && systemctl is-active telegram-calendar-bot"
