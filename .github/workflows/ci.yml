name: CI

on:
  push:
    branches: [main, master]
  pull_request:

# Cancel in-flight runs on the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────────
  # Backend: typecheck, build, unit tests (no DB).
  # Mirrors `.husky/pre-push` so a green pipeline matches a green local push.
  # ──────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test:unit

  # ──────────────────────────────────────────────────────────────────────
  # Backend integration tests — hit a real PostgreSQL instance.
  # Runs DB migrations, then exercises repository + service layers.
  # ──────────────────────────────────────────────────────────────────────
  backend-integration:
    name: Backend (integration, PostgreSQL)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgres://ci:ci@localhost:5432/ci
      # Integration tests don't need real Telegram or Google credentials,
      # but the env loader expects these keys to exist or be empty strings.
      TELEGRAM_BOT_TOKEN: ""
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      OPENROUTER_API_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Run integration tests
        # `npm test` picks up everything matching tests/*.test.ts via the
        # tsx --test glob, including the new *.integration.test.ts files.
        run: npm test

  # ──────────────────────────────────────────────────────────────────────
  # Webapp: typecheck + build.
  # ──────────────────────────────────────────────────────────────────────
  webapp:
    name: Webapp (smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────
  # Webapp end-to-end tests under Playwright.
  # `playwright.config.ts` already wires `npm run build && npm run preview`
  # as `webServer`, so we only need browser binaries installed.
  # ──────────────────────────────────────────────────────────────────────
  webapp-e2e:
    name: Webapp (Playwright e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: Run e2e tests
        run: npx playwright test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: webapp/playwright-report/
          retention-days: 14
